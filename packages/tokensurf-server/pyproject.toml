[project]
name = "tokensurf-server"
version = "0.1.0"
description = "Self-hosted FastAPI + Postgres collector for TokenSurf eval runs."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "TokenSurf" }]
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "sqlalchemy>=2",
    "alembic",
    "psycopg[binary]>=3",
    "pydantic-settings",
    "tokensurf",
    "jinja2",
    "python-multipart",
    "itsdangerous",
    "cryptography",
    "httpx",
]

[project.scripts]
tokensurf-server = "tokensurf_server.admin_cli:app"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "ruff>=0.6",
    "pyright>=1.1.350",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tokensurf_server"]

[tool.uv.sources]
tokensurf = { workspace = true }

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pyright]
include = ["src", "tests"]
pythonVersion = "3.11"
typeCheckingMode = "standard"
venvPath = "../.."
venv = ".venv"

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]

[tool.coverage.run]
source = ["tokensurf_server"]
