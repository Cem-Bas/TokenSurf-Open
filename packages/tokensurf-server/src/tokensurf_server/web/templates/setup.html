{% extends "base.html" %}
{% block title %}Set up TokenSurf — first run{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">Token<em>Surf</em></div>
    <div class="login-sub">Create the admin account</div>

    {% if error %}
    <div class="error-msg" role="alert">{{ error }}</div>
    {% endif %}

    <p class="login-sub">
      Find the setup token in the server's startup logs, or read it from the file at
      <code>{{ setup_token_path }}</code>.
    </p>

    <form method="post" action="/setup" novalidate>
      <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
      <div class="form-group">
        <label for="token">Setup token</label>
        <input type="text" id="token" name="token" required autofocus>
      </div>
      <div class="form-group">
        <label for="email">Admin email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="new-password"
          minlength="8"
          required
        >
      </div>
      <button type="submit" class="btn-primary">Create admin account</button>
    </form>
  </div>
</div>
{% endblock %}
