[project]
name = "tokensurf"
version = "0.1.0"
description = "Open-source AI agent quality framework: scoring engine, capture SDK, and offline eval harness."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "TokenSurf" }]
dependencies = [
    "pydantic>=2",
    "litellm>=1.40",
    "typer>=0.12",
]

[project.optional-dependencies]
push = ["httpx>=0.27"]

[project.scripts]
tokensurf = "tokensurf.cli:app"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "ruff>=0.6",
    "pyright>=1.1.350",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tokensurf"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pyright]
include = ["src", "tests"]
pythonVersion = "3.11"
typeCheckingMode = "standard"
venvPath = "../.."
venv = ".venv"

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]

[tool.coverage.run]
source = ["tokensurf"]
