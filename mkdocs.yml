site_name: TokenSurf
site_description: Open-source AI agent quality framework — scoring engine, capture SDK, offline eval harness, and a self-hosted collector server.
repo_url: https://github.com/Cem-Bas/TokenSurf-Open
repo_name: Cem-Bas/TokenSurf-Open
edit_uri: ""

docs_dir: docs


theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Guides:
      - SDK reference: sdk.md
      - Scorers: scorers.md
      - CLI reference: cli.md
  - Server:
      - Self-hosting: self-hosting.md
      - Quality gates & notifications: quality-gates.md
      - Judge keys & config pull: config-pull.md
  - Security model: security.md
